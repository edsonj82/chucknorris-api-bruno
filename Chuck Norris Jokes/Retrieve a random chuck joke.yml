info:
  name: Retrieve a random chuck joke
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/jokes/random"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const Ajv = require('ajv');
        const ajv = new Ajv();

        // Defina o seu JSON Schema exatamente como estava no Postman
        const schema = {
          type: "object",
          required: ["categories", "created_at", "icon_url", "id", "updated_at", "url", "value"],
          properties: {
            categories: { type: "array", items: { type: "string" } },
            created_at: { type: "string" },
            icon_url: { type: "string" },
            id: { type: "string" },
            updated_at: { type: "string" },
            url: { type: "string" },
            value: { type: "string" }
          }
        };

        const json = res.getBody();            // Você já mapeou o corpo aqui como 'json'
        const validate = ajv.compile(schema);  // Compila o schema e depois valida
        const valid = validate(json);          // Passa a variável 'json' correta para o validador

        // Se falhar, exibe os erros detalhados no log do Bruno
        if(!valid){
          console.error("Falha na validação do Schema", validate.errors);
        }

        // Criando o report visual na aba Tests do Bruno
        test("JSON Schema should be valid", function(){
          expect(valid).to.be.true;
        });
    - type: tests
      code: |-
        test("res.status should be 200",function(){
          const data = res.getBody();
          expect(res.getStatus()).to.equal(200);
        });

        // Validação do Content-Type
        test("API returns the correct format (application/json)",function(){
          const contentType = res.getHeader('content-type');
          expect(contentType).to.include('application/json');
        });

        // Validação do Cache-Control
        test("check if the caching policy is correct",function(){
          const cacheControl = res.getHeader('cache-control');
          // DICA: Caso sua API use uma política de cache por tempo, use a linha abaixo:
          expect(cacheControl).to.not.be.null;
          //expect(cacheControl).to.include('no-cache');// Se a API exigir dados dinâmicos (como a do Chuck Norris)
        });

        // Validação do Tempo de Resposta (Response Time)
        test("validate if the server responds within an acceptable range.",function(){
          const responseTime = res.getResponseTime();
          expect(responseTime).to.be.below(1500);// Define o limite máximo tolerável em milissegundos (ex: 1500ms = 1.5s)
        })
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
