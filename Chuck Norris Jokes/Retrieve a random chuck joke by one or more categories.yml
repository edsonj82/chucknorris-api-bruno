info:
  name: Retrieve a random chuck joke by one or more categories
  type: http
  seq: 3

http:
  method: get
  url: https://api.chucknorris.io/jokes/random?category=dev,explicit
  headers:
    - name: accept
      value: application/json
  params:
    - name: category
      value: dev,explicit
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
